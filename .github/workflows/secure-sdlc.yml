name: Secure SDLC Pipeline

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  container-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bkimminich/juice-shop
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0
